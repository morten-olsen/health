# Build and push the Docker image to the Forgejo OCI registry.
# Pushes code.olsen.cloud/incubator/health:latest and :<short-sha>.
# Then scans the resulting image for HIGH/CRITICAL CVEs.

name: build

when:
  - event: [push, manual]
    branch: main

# Wait for the gate — without depends_on, kaniko pushes images even when
# tests or license checks are failing.
depends_on:
  - quality
  - compliance

steps:
  build:
    image: code.olsen.cloud/ci/kaniko-build:latest
    settings:
      auth:
        from_secret: forgejo_registry_auth

  scan:
    image: code.olsen.cloud/ci/trivy:latest
    settings:
      target: image
      image: code.olsen.cloud/${CI_REPO}:${CI_COMMIT_SHA:0:8}
      severity: HIGH,CRITICAL
      exit_code: 1
      ignore_unfixed: true
    depends_on: [build]
